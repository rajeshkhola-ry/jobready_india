name: Deploy Flutter Web Preview (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Web (Custom domain root path)
        run: flutter build web --release --base-href "/" --no-web-resources-cdn

      - name: Disable Jekyll
        run: touch build/web/.nojekyll

      - name: Add custom domain CNAME
        run: echo "getreadyjob.com" > build/web/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Health check published site
        run: |
          SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Checking $SITE_URL"
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" -L "$SITE_URL")
            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "Health check passed with HTTP $status"
              exit 0
            fi
            echo "Attempt $i failed with HTTP $status; retrying in 10s..."
            sleep 10
          done
          echo "Health check warning: site may still be propagating or custom DNS may not be ready"
